<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarot Portal</title>
  <style>
    :root{
      --ui-dim: rgba(6, 10, 16, 0.58);
      --parchment:#e6d4b4;
      --ink:#1c2740;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;
      font-family:PingFang SC,Helvetica Neue,Arial,sans-serif;
      background:#0f1826;color:var(--ink);user-select:none;
    }
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.18) 0 1px, transparent 1.2px),
        radial-gradient(circle at 80% 40%, rgba(255,255,255,.14) 0 1px, transparent 1.2px),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,.10) 0 1px, transparent 1.2px);
      background-size:88px 88px;opacity:.09;mix-blend-mode:screen;
    }
    .page{position:relative;width:100vw;height:100vh;overflow:hidden;z-index:2;}
    .cosmos{
      position:absolute;inset:0;
      background:
        radial-gradient(circle at 50% 30%, rgba(79,143,141,.10), transparent 18%),
        linear-gradient(180deg, #0f1826 0%, #121d2d 55%, #0d1520 100%);
      transition: filter .45s ease, transform .45s ease;
    }
    .main-screen.hover-dim .cosmos{
      filter: blur(0.6px) saturate(1.08) brightness(0.92);
      transform: scale(1.02);
    }
    .galaxy{position:absolute;inset:0;overflow:hidden;pointer-events:none;opacity:.95;}
    .star{
      position:absolute;width:2px;height:2px;border-radius:50%;
      background:#fff;opacity:.8;box-shadow:0 0 6px rgba(255,255,255,.55);
      animation: driftStar linear infinite;
    }
    @keyframes driftStar{
      from{ transform: translateX(-120px); opacity:0; }
      8%{ opacity:.9 }
      92%{ opacity:.6 }
      to{ transform: translateX(calc(100vw + 120px)); opacity:0; }
    }

    .login-screen,.main-screen{position:absolute;inset:0;display:none;}
    .login-screen.active,.main-screen.active{display:block;}

    .intro-wrap{
      position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
      text-align:center;transition:opacity .85s ease, transform .85s ease, filter .85s ease;z-index:20;
    }
    .intro-wrap.hide{opacity:0;transform:translate(-50%,-50%) scale(.96);filter:blur(2px);pointer-events:none;}
    .intro-cta{
      color:#f2e6cf;font-size:min(6vw,44px);letter-spacing:.14em;cursor:pointer;
      text-shadow:0 0 18px rgba(242,230,207,.08);padding:10px 18px;
    }
    .intro-sub{margin-top:10px;color:rgba(242,230,207,.72);font-size:12px;letter-spacing:.18em;opacity:.85;}

    .topbar{
      position:absolute;left:16px;right:16px;top:14px;z-index:40;
      display:flex;justify-content:space-between;align-items:center;color:#f2e6cf;pointer-events:none;
    }
    .brand{font-size:13px;letter-spacing:.12em;opacity:.85;}
    .magic-btn{
      width:40px;height:40px;border:1px solid rgba(242,230,207,.18);
      background:rgba(15,22,34,.56);backdrop-filter:blur(4px);display:grid;place-items:center;
      cursor:pointer;pointer-events:auto;color:#f2e6cf;
    }
    .magic-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;}

    .table-area{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding-top:60px;
    }
    .dim-layer{
      position:absolute;inset:0;background:var(--ui-dim);opacity:0;pointer-events:none;
      transition:opacity .25s ease;z-index:8;
    }
    .main-screen.hover-dim .dim-layer{opacity:1;}

    .card-row{
      position:relative;width:100%;height:100%;overflow:hidden;z-index:10;
      transition:filter .35s ease, transform .35s ease;
    }
    .card-row.focus-three{
      filter: blur(1px) brightness(0.48);
      transform: scale(.995);
    }

    .tarot-card{
      position:absolute;left:50%;top:50%;width:92px;height:154px;
      transform-style:preserve-3d;cursor:pointer;will-change:transform,left,top,opacity,filter;
      transition:
        transform .28s cubic-bezier(.2,.8,.2,1),
        filter .28s ease,
        opacity .22s ease,
        left .55s cubic-bezier(.22,.88,.16,1),
        top .55s cubic-bezier(.22,.88,.16,1);
      opacity:1;
    }
    .tarot-card .inner{
      position:absolute;inset:0;transform-style:preserve-3d;
      transition:transform .72s cubic-bezier(.2,.8,.2,1);
      border-radius:14px;
    }
    .tarot-card[data-face="front"] .inner{
      transform:rotateY(180deg) !important;
    }
    .tarot-card.stacked{
      transform:translate(-50%, -50%) scale(1) rotate(0deg) !important;
      opacity:1;filter:none;pointer-events:none;
    }
    .tarot-card.selected{
      position:fixed;z-index:80;width:220px;height:368px;cursor:default;
    }
    .tarot-card.reversed.selected{transform:translate(-50%,-50%) scale(1.1) rotate(180deg);}

    .face{
      position:absolute;inset:0;backface-visibility:hidden;border:2px solid rgba(242,230,207,.24);
      overflow:hidden;background:#e9dfca;box-shadow:inset 0 0 0 1px rgba(0,0,0,.14);
      border-radius:16px;
    }
    .front{transform:rotateY(180deg);background-size:cover;background-position:center;}
    .back{background-image:url('./背景图.jpg');background-size:cover;background-position:center;}

    .card-label{
      position:absolute;left:50%;bottom:-34px;transform:translateX(-50%) translateY(8px);
      text-align:center;color:rgba(242,230,207,0);font-size:11px;letter-spacing:.08em;
      white-space:nowrap;opacity:0;transition:opacity .9s ease, color .9s ease, transform .9s ease, top .9s ease, bottom .9s ease;
      pointer-events:none;
    }
    .tarot-card.selected.upright .card-label{
      bottom:-34px;top:auto;color:rgba(242,230,207,.92);opacity:1;transform:translateX(-50%) translateY(0);
    }
    .tarot-card.selected.reversed .card-label{
      top:-34px;bottom:auto;color:rgba(242,230,207,.92);opacity:1;
      transform:translateX(-50%) rotate(180deg) translateY(0);
    }

    .orientation-badge{
      position:absolute;top:10px;right:10px;padding:6px 8px;background:rgba(242,230,207,.92);
      color:#152133;font-size:12px;font-weight:700;z-index:2;display:none;
    }
    .tarot-card.selected .orientation-badge{display:block;}
    .tarot-card.hovered{filter:brightness(1.18) saturate(1.08);z-index:95 !important;}
    .tarot-card.hovered .inner{transform:translateY(-10px);}

    .reading-panel{
      position:absolute;left:50%;transform:translateX(-50%);width:min(340px, 80vw);min-height:84px;
      padding:14px 16px;border:1px solid rgba(136,97,53,.28);
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.28), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.14), transparent 16%),
        linear-gradient(135deg, rgba(244,232,205,.98), rgba(225,205,165,.95));
      color:#3e2b1b;z-index:29;box-shadow:0 18px 50px rgba(0,0,0,.35);
      font-size:13px;line-height:1.8;opacity:0;transition:opacity .45s ease, transform .45s ease;pointer-events:none;
      border-radius:14px;overflow:hidden;
    }
    .reading-panel::before{
      content:"";position:absolute;inset:0;pointer-events:none;
      background:linear-gradient(90deg, rgba(185,149,98,.16), rgba(255,255,255,0) 18%, rgba(255,255,255,0) 82%, rgba(185,149,98,.12));
      mix-blend-mode:multiply;
    }
    .reading-panel.show{opacity:1;}
    .reading-title{font-weight:800;margin-bottom:4px;font-size:13px;color:#4b3525;}
    .reading-one{top:calc(44% + 212px);}
    .reading-two{top:calc(44% + 212px);}
    .reading-three{top:calc(44% + 212px);}

    /* 组合牌意：更丰富，支持滚轮查看但不显示右侧灰条 */
    .combo-reading{
      left:50%;
      top:calc(50% + 220px);
      width:min(860px, 94vw);
      max-height:32vh;
      overflow:auto;
      transform:translateX(-50%);
      padding:18px 20px;
      line-height:1.85;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.28), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.12), transparent 18%),
        linear-gradient(135deg, rgba(244,232,205,.98), rgba(225,205,165,.95));
      border:1px solid rgba(110,74,40,.25);
      box-shadow:0 24px 55px rgba(0,0,0,.42), inset 0 0 0 1px rgba(255,255,255,.22);
      color:#3d2b1c;
      border-radius:16px;
      font-size:13px;
      pointer-events:none;

      scrollbar-width:none;   /* Firefox */
      -ms-overflow-style:none; /* IE/Edge */
    }
    .combo-reading::-webkit-scrollbar{width:0;height:0;display:none;}

    .combo-stage{
      position:absolute;left:50%;top:43%;transform:translate(-50%,-50%);
      display:flex;gap:34px;align-items:flex-start;justify-content:center;z-index:26;
    }
    .hidden{display:none !important;}

    .magic-ring{
      position:absolute;left:50%;top:50%;width:240px;height:240px;transform:translate(-50%,-50%) scale(.65);
      border:1px solid rgba(255,255,255,.12);border-radius:50%;opacity:0;pointer-events:none;z-index:4;
      box-shadow:0 0 30px rgba(255,255,255,.08), inset 0 0 30px rgba(255,255,255,.04);
    }
    .magic-ring.active{animation:ringPulse 1.25s ease-out 1;}

    .spell-particles{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden;}
    .spell-particle{
      position:absolute;left:50%;top:55%;width:3px;height:3px;border-radius:50%;background:#fff;
      box-shadow:0 0 10px rgba(255,255,255,.65);opacity:0;animation:spellRise 1.6s ease-out forwards;
    }
    @keyframes spellRise{
      0%{transform:translate(-50%,-50%) scale(.8);opacity:0;}
      15%{opacity:1;}
      100%{transform:translate(calc(-50% + var(--dx)), calc(-50% - var(--dy))) scale(1.4);opacity:0;}
    }

    @media (max-width:900px){
      .tarot-card.selected{width:180px;height:300px;}
      .reading-panel{width:min(320px, 84vw);}
      .combo-reading{width:min(94vw, 94vw);max-height:36vh;}
    }
    @media (max-width:720px){
      .brand{display:none;}
      .intro-cta{font-size:30px;}
      .intro-sub{font-size:11px;}
      .reading-panel{width:min(280px, 88vw);}
    }
  </style>
</head>
<body>
<div class="page">
  <div class="cosmos" id="cosmos">
    <div class="galaxy" id="galaxy"></div>
    <div class="magic-ring" id="magicRing"></div>
    <div class="spell-particles" id="spellParticles"></div>
  </div>

  <div class="login-screen active" id="loginScreen">
    <div class="intro-wrap" id="introWrap">
      <div class="intro-cta" id="startJourney">开启奇妙旅程</div>
      <div class="intro-sub">BEGIN YOUR ENCHANTED JOURNEY</div>
    </div>
  </div>

  <div class="main-screen" id="mainScreen">
    <div class="topbar">
      <div class="brand">TAROT / PORTAL</div>
      <button class="magic-btn" id="resetBtn" title="返回初始界面">
        <svg viewBox="0 0 24 24">
          <path d="M12 2l1.9 5.2L19 9.2l-5.1 1.9L12 16l-1.9-4.9L5 9.2l5.1-2L12 2z"></path>
          <path d="M18.5 13.5l.9 2.4 2.4.9-2.4.9-.9 2.4-.9-2.4-2.4-.9 2.4-.9.9-2.4z"></path>
        </svg>
      </button>
    </div>

    <div class="table-area">
      <div class="dim-layer" id="dimLayer"></div>
      <div class="card-row" id="cardRow"></div>
      <div class="reading-panel hidden" id="readingPanel">
        <div class="reading-title" id="readingTitle"></div>
        <div id="readingText"></div>
      </div>
    </div>

    <div class="combo-stage hidden" id="comboStage"></div>
    <div class="reading-panel combo-reading hidden" id="comboReading"></div>
  </div>
</div>

    { name:'宝剑侍从', image:'宝剑侍从 Page of Swords.jpg', upright:'观察、好奇、警觉', reversed:'八卦、轻率、信息失真' },
    { name:'宝剑骑士', image:'宝剑骑士 Knight of Swords.jpg', upright:'快速、决断、锋利', reversed:'鲁莽、冲突、急进' },
    { name:'宝剑王后', image:'宝剑王后 Queen of Swords.jpg', upright:'理性、边界、清醒', reversed:'冷硬、刻薄、防御' },
    { name:'宝剑国王', image:'宝剑国王 King of Swords.jpg', upright:'逻辑、权威、公正', reversed:'专横、苛刻、失衡' },
    { name:'星币 Ace', image:'星币 Ace Ace of Pentacles.jpg', upright:'机会、起步、现实成果', reversed:'延误、计划落空、损失' },
    { name:'星币 2', image:'星币 2 Two of Pentacles.jpg', upright:'平衡、多任务、适应', reversed:'失衡、混乱、超负荷' },
    { name:'星币 3', image:'星币 3 Three of Pentacles.jpg', upright:'协作、技能、建构', reversed:'配合差、敷衍、目标不清' },
    { name:'星币 4', image:'星币 4 Four of Pentacles.jpg', upright:'守成、控制、安全感', reversed:'放手、流动、过度保守' },
    { name:'星币 5', image:'星币 5 Five of Pentacles.jpg', upright:'匮乏、困难、孤立', reversed:'改善、求助、恢复' },
    { name:'星币 6', image:'星币 6 Six of Pentacles.jpg', upright:'给予、接受、平衡', reversed:'不平等、偏向、交换失衡' },
    { name:'星币 7', image:'星币 7 Seven of Pentacles.jpg', upright:'等待、评估、耐心', reversed:'急躁、停滞、怀疑投入' },
    { name:'星币 8', image:'星币 8 Eight of Pentacles.jpg', upright:'练习、专注、打磨', reversed:'敷衍、重复、缺乏投入' },
    { name:'星币 9', image:'星币 9 Nine of Pentacles.jpg', upright:'独立、富足、品味', reversed:'依赖、空虚、表面富足' },
    { name:'星币 10', image:'星币 10 Ten of Pentacles.jpg', upright:'家族、稳定、传承', reversed:'家族压力、金钱牵绊、断层' },
    { name:'星币侍从', image:'星币侍从 Page of Pentacles.jpg', upright:'学习、实践、起步', reversed:'拖延、分心、缺乏执行' },
    { name:'星币骑士', image:'星币骑士 Knight of Pentacles.jpg', upright:'稳健、勤恳、可靠', reversed:'缓慢、固执、停滞' },
    { name:'星币王后', image:'星币王后 Queen of Pentacles.jpg', upright:'照料、务实、丰盛', reversed:'过度付出、焦虑、失衡' },
    { name:'星币国王', image:'星币国王 King of Pentacles.jpg', upright:'成功、掌控、成熟', reversed:'贪婪、僵化、物质执念' }
  ];

  const loginScreen=document.getElementById('loginScreen');
  const mainScreen=document.getElementById('mainScreen');
  const startJourney=document.getElementById('startJourney');
  const resetBtn=document.getElementById('resetBtn');
  const cardRow=document.getElementById('cardRow');
  const readingPanel=document.getElementById('readingPanel');
  const readingTitle=document.getElementById('readingTitle');
  const readingText=document.getElementById('readingText');
  const comboStage=document.getElementById('comboStage');
  const comboReading=document.getElementById('comboReading');
  const dimLayer=document.getElementById('dimLayer');
  const galaxy=document.getElementById('galaxy');
  const magicRing=document.getElementById('magicRing');
  const spellParticles=document.getElementById('spellParticles');
  const introWrap=document.getElementById('introWrap');

  let deck=[], arranged=false, selectedCards=[];
  let mouseX=window.innerWidth/2, mouseY=window.innerHeight/2;
  let pausedHover=false, deckOffset=0, targetDeckOffset=0;
  let visibleCount=20;
  let dragState={active:false,lastX:0,velocity:0};

  function shuffle(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function createGalaxy(){
    galaxy.innerHTML='';
    for(let i=0;i<110;i++){
      const s=document.createElement('span');
      s.className='star';
      const top=Math.random()*92;
      s.style.top=`${top}%`;
      s.style.left=`${-18-Math.random()*60}px`;
      s.style.animationDuration=`${16+Math.random()*24}s`;
      s.style.animationDelay=`${Math.random()*10}s`;
      s.style.transform=`scale(${0.45+Math.random()*1.6})`;
      s.style.opacity=`${0.12+Math.random()*0.72}`;
      const size=1+Math.random()*2;
      s.style.width=`${size}px`;
      s.style.height=`${size}px`;
      galaxy.appendChild(s);
    }
  }

  function triggerMagicOpening(){
    magicRing.classList.remove('active'); void magicRing.offsetWidth; magicRing.classList.add('active');
    spellParticles.innerHTML='';
    for(let i=0;i<46;i++){
      const p=document.createElement('span');
      p.className='spell-particle';
      p.style.setProperty('--dx', `${(Math.random()*2-1)*180}px`);
      p.style.setProperty('--dy', `${120+Math.random()*240}px`);
      p.style.left=`${50+(Math.random()*2-1)*12}%`;
      p.style.top=`${54+(Math.random()*2-1)*8}%`;
      p.style.animationDelay=`${Math.random()*0.35}s`;
      spellParticles.appendChild(p);
    }
    setTimeout(()=>{ spellParticles.innerHTML=''; },1800);
  }

  function resetAll(){
    deck=shuffle(tarotData);
    arranged=false;
    selectedCards=[];
    pausedHover=false;
    deckOffset=0;
    targetDeckOffset=0;
    cardRow.classList.remove('focus-three');
    cardRow.innerHTML='';
    comboStage.innerHTML='';
    comboStage.classList.add('hidden');
    comboReading.classList.add('hidden');
    readingPanel.classList.add('hidden');
    mainScreen.classList.remove('hover-dim');
    dimLayer.style.opacity='0';
    buildStack();
  }

  function showMain(){
    loginScreen.classList.remove('active');
    mainScreen.classList.add('active');
    introWrap.classList.add('hide');
    triggerMagicOpening();
    setTimeout(()=>{ introWrap.style.display='none'; },850);
    setTimeout(()=>{ resetAll(); },220);
  }

  function returnToIntro(){
    mainScreen.classList.remove('active');
    loginScreen.classList.add('active');
    introWrap.style.display='block';
    introWrap.classList.remove('hide');
    resetAll();
  }

  startJourney.addEventListener('click', showMain);
  resetBtn.addEventListener('click', returnToIntro);

  function createCardEl(card,index){
    const el=document.createElement('div');
    el.className='tarot-card stacked';
    el.dataset.index=index;
    el.dataset.name=card.name;
    el.dataset.face='back';
    el.style.zIndex=20+index;
    el.innerHTML=`
      <div class="inner">
        <div class="face back"></div>
        <div class="face front" style="background-image:url('${CARD_DIR}/${card.image}')"></div>
      </div>
      <div class="orientation-badge">正位</div>
      <div class="card-label">${card.name}</div>
    `;
    el.addEventListener('click',()=>onCardClick(index));
    return el;
  }

  function buildStack(){
    cardRow.innerHTML='';
    deck.forEach((card,index)=>{
      const el=createCardEl(card,index);
      el.style.left='50%';
      el.style.top='50%';
      el.style.transform='translate(-50%, -50%) scale(1) rotate(0deg)';
      cardRow.appendChild(el);
    });
  }

  function arrangeArc(){
    if(!arranged){
      arranged=true;
      renderDeck();
    }
  }

  function renderDeck(){
    const cards=[...cardRow.querySelectorAll('.tarot-card')];
    const centerIndex=Math.round(deckOffset);
    const startIndex=centerIndex-Math.floor(visibleCount/2);
    const radiusX=Math.min(window.innerWidth*0.46, 760);
    const radiusY=Math.min(window.innerHeight*0.29, 300);

    cards.forEach((el,index)=>{
      if(el.classList.contains('selected')) return;
      el.classList.remove('stacked');

      const rel=index-startIndex;
      const inRange=rel>=-10 && rel<=visibleCount+10;

      if(!inRange){
        const side=index<startIndex?-1:1;
        el.style.opacity='0';
        el.style.pointerEvents='none';
        el.style.left=`calc(50% + ${side*(window.innerWidth*1.03)}px)`;
        el.style.top='66%';
        return;
      }

      const normalized=(rel/visibleCount)*Math.PI;
      const x=Math.cos(normalized)*radiusX;
      const y=-Math.sin(normalized)*radiusY;
      const scale=0.84+0.26*Math.cos(normalized);
      const rot=(rel-visibleCount/2)*1.35;
      const opacity=Math.max(0.16, 1-Math.abs(rel-visibleCount/2)*0.045);

      el.style.opacity=String(opacity);
      el.style.pointerEvents='auto';
      el.style.left=`calc(50% + ${x}px)`;
      el.style.top=`calc(66% + ${y}px)`;
      el.style.transform=`translate(-50%, -50%) scale(${scale}) rotate(${rot}deg)`;
      el.style.zIndex=20+index;
    });
  }

  function settleInertia(){
    if(arranged && selectedCards.length<3 && !pausedHover){
      if(!dragState.active){
        targetDeckOffset += dragState.velocity * 0.015;
        dragState.velocity *= 0.92;
      }
      const diff=targetDeckOffset-deckOffset;
      deckOffset += diff * 0.12;
      if(Math.abs(diff)<0.001) deckOffset=targetDeckOffset;
      renderDeck();
    }
    requestAnimationFrame(settleInertia);
  }

  function makeBriefMeaning(card, orientation){
    return orientation==='upright' ? card.upright : card.reversed;
  }

  function buildComboMeaning(cards){
    const n1 = cards[0], n2 = cards[1], n3 = cards[2];
    return `
      <div class="reading-title" style="font-size:16px;text-align:center;margin-bottom:12px;color:#4b3525;">
        组合牌意 · Tarot Reading
      </div>
      <div style="display:grid;gap:12px;">
        <div style="padding:12px 14px;border-left:4px solid rgba(95,67,44,.35);background:rgba(255,255,255,.35);border-radius:10px;">
          <b>整体语气：</b> 这组三张牌呈现出一种“从内在混沌到结构成形”的节奏。第一张牌像起点，带出当前局势的核心情绪；第二张牌是过程中的推动力，提示你正从一个阶段过渡到另一个阶段；第三张牌则更像结果或落点，说明最终的方向并不凌乱，而是逐步收束。
        </div>
        <div style="padding:12px 14px;border-left:4px solid rgba(95,67,44,.25);background:rgba(255,255,255,.28);border-radius:10px;">
          <b>关系层面：</b> 如果你问的是感情、合作、沟通，这组三张牌说明关系里最关键的不是“有没有答案”，而是“能否把各自的立场放到同一张桌子上”。${n1.name} 代表最初状态，${n2.name} 代表互动过程，${n3.name} 代表最终态势，三者一起看，会更清楚谁在推动、谁在犹疑、谁在收尾。
        </div>
        <div style="padding:12px 14px;border-left:4px solid rgba(95,67,44,.2);background:rgba(255,255,255,.22);border-radius:10px;">
          <b>现实建议：</b> 这段时间适合先稳住节奏，再谈加速。你需要关注两件事：第一，是否有过度消耗或情绪内耗；第二，是否缺少明确边界和执行步骤。如果答案是肯定的，那么最优策略不是强行突破，而是重新排序优先级、减少杂音、把关键动作拆小。
        </div>
        <div style="padding:12px 14px;border-left:4px solid rgba(95,67,44,.18);background:rgba(255,255,255,.20);border-radius:10px;">
          <b>结果倾向：</b> 这组牌不是“彻底停滞”的牌，它更像是在说：局势已经开始往前走，但你必须顺着牌面给出的节奏推进，才不会让机会在混乱中散掉。若你愿意等待并整理，就会看见更稳定、更清晰的下一步。
        </div>
      </div>
    `;
  }

  function showSlotReading(slot,title,orientationText,text){
    readingPanel.classList.remove('hidden');
    readingPanel.classList.add('show');
    readingPanel.classList.remove('reading-one','reading-two','reading-three');
    if(slot===0) readingPanel.classList.add('reading-one');
    if(slot===1) readingPanel.classList.add('reading-two');
    if(slot===2) readingPanel.classList.add('reading-three');
    readingTitle.textContent=`${title} · ${orientationText}`;
    readingText.textContent=text;
  }

  function refreshSelectedPositions(){
    const cards=[...cardRow.querySelectorAll('.tarot-card')];
    selectedCards.forEach((c,idx)=>{
      const el=cards[c.index];
      if(!el) return;
      const targetX = idx===0 ? -260 : (idx===1 ? 0 : 260);
      el.classList.add('selected');
      el.classList.remove('upright','reversed');
      el.classList.add(c.orientation);
      el.dataset.face='front';
      el.dataset.orientation = c.orientation;
      el.style.opacity='1';
      el.style.pointerEvents='none';
      el.style.left=`calc(50% + ${targetX}px)`;
      el.style.top = idx===1 ? '41.5%' : '44.5%';
      el.style.transform = c.orientation==='reversed'
        ? 'translate(-50%, -50%) scale(1) rotate(180deg)'
        : 'translate(-50%, -50%) scale(1)';
      el.querySelector('.orientation-badge').textContent = c.orientation==='upright' ? '正位' : '逆位';
      setTimeout(()=>{ el.querySelector('.card-label').style.opacity='1'; }, 80 + idx*120);
    });
    if(selectedCards.length===3) cardRow.classList.add('focus-three');
  }

  function layoutCardsFromCenter(selectedIndex){
    const cards=[...cardRow.querySelectorAll('.tarot-card')];
    const centerY = window.innerHeight * 0.46;
    const radiusX=Math.min(window.innerWidth*0.46, 760);
    const radiusY=Math.min(window.innerHeight*0.24, 260);

    cards.forEach((el,i)=>{
      if(el.classList.contains('selected')) return;

      const offset=i-selectedIndex;
      const visibleWindow=12;
      if(Math.abs(offset)>20){
        const side=offset<0?-1:1;
        el.style.opacity='0';
        el.style.pointerEvents='none';
        el.style.left=`calc(50% + ${side*window.innerWidth}px)`;
        el.style.top=`${centerY}px`;
        return;
      }

      const angle=(offset + visibleWindow) / (visibleWindow*2) * Math.PI;
      const x=Math.cos(angle)*radiusX;
      const y=-Math.sin(angle)*radiusY;
      const scale=0.86 + 0.22 * Math.cos(angle);
      const opacity=Math.max(0.18, 1-Math.abs(offset)*0.042);

      el.style.opacity=String(opacity);
      el.style.pointerEvents='auto';
      el.style.left=`calc(50% + ${x}px)`;
      el.style.top=`calc(${centerY}px + ${y}px)`;
      el.style.transform=`translate(-50%, -50%) scale(${scale}) rotate(${offset*1.6}deg)`;
      el.style.zIndex=30 + (100 - Math.abs(offset));
    });
  }

  function onCardClick(index){
    if(!arranged || selectedCards.length>=3 || selectedCards.some(c=>c.index===index) || mainScreen.classList.contains('anim-lock')) return;

    mainScreen.classList.add('anim-lock');
    pausedHover=true;

    const cardData=deck[index];
    const orientation=Math.random()<0.5 ? 'upright' : 'reversed';
    const orientationText=orientation==='upright' ? '正位' : '逆位';
    const cards=[...cardRow.querySelectorAll('.tarot-card')];
    const el=cards[index];
    if(!el){ mainScreen.classList.remove('anim-lock'); pausedHover=false; return; }

    const slot=selectedCards.length;
    selectedCards.push({ index, ...cardData, orientation, slot });

    el.dataset.face='front';
    el.classList.add('selected');
    el.classList.remove('upright','reversed');
    el.classList.add(orientation);
    if(orientation==='reversed') el.classList.add('reversed');
    if(orientation==='upright') el.classList.add('upright');
    el.querySelector('.orientation-badge').textContent=orientationText;
    el.style.zIndex=120;
    el.style.opacity='1';
    el.style.pointerEvents='none';

    requestAnimationFrame(()=>{
      el.style.left='50%';
      el.style.top='44%';
      el.style.transform = orientation==='reversed'
        ? 'translate(-50%, -50%) scale(1.18) rotate(180deg)'
        : 'translate(-50%, -50%) scale(1.18)';
    });

    dimLayer.style.opacity='1';
    mainScreen.classList.add('hover-dim');

    showSlotReading(slot, cardData.name, orientationText, makeBriefMeaning(cardData, orientation));

    setTimeout(()=>{
      el.dataset.face='front';
      el.style.transition='transform .55s ease, opacity .28s ease';
      el.style.transform = orientation==='reversed'
        ? 'translate(-50%, -50%) scale(1) rotate(180deg)'
        : 'translate(-50%, -50%) scale(1)';

      refreshSelectedPositions();
      layoutCardsFromCenter(index);

      pausedHover=false;
      mainScreen.classList.remove('anim-lock');

      if(selectedCards.length===3) showComboView();
    }, 720);
  }

  function showComboView(){
    readingPanel.classList.add('hidden');
    comboStage.innerHTML='';
    comboStage.classList.remove('hidden');
    comboReading.classList.remove('hidden');
    comboReading.classList.add('show');

    const cards=[...cardRow.querySelectorAll('.tarot-card')];
    selectedCards.forEach((c)=>{
      const el=cards[c.index];
      if(!el) return;

      const copy=document.createElement('div');
      copy.className='tarot-card selected';
      copy.dataset.face='front';
      copy.style.position='relative';
      copy.style.left='auto';
      copy.style.top='auto';
      copy.style.width='130px';
      copy.style.height='216px';
      copy.style.pointerEvents='none';
      copy.style.opacity='1';
      copy.style.transform = c.orientation==='reversed' ? 'scale(1) rotate(180deg)' : 'scale(1)';
      copy.innerHTML=`
        <div class="inner" style="transform:rotateY(180deg);">
          <div class="face back"></div>
          <div class="face front" style="background-image:url('${CARD_DIR}/${c.image}')"></div>
        </div>
        <div class="orientation-badge" style="display:none"></div>
        <div class="card-label" style="opacity:0"></div>
      `;
      comboStage.appendChild(copy);
    });

    comboStage.style.gap='30px';
    comboReading.innerHTML = buildComboMeaning(selectedCards);
    comboReading.classList.add('show');
    comboStage.style.top='41%';
    cardRow.classList.add('focus-three');
  }

  function hoverFlow(){
    const cards=[...cardRow.querySelectorAll('.tarot-card')];
    if(!arranged || selectedCards.length>=3 || pausedHover){
      requestAnimationFrame(hoverFlow);
      return;
    }

    let hovered=null, nearestDist=1e9;
    cards.forEach(card=>{
      if(card.classList.contains('selected') || card.style.opacity==='0') return;
      const r=card.getBoundingClientRect();
      const cx=r.left+r.width/2;
      const cy=r.top+r.height/2;
      const d=Math.hypot(mouseX-cx, mouseY-cy);
      if(d<nearestDist){ nearestDist=d; hovered=card; }
    });

    cards.forEach(card=>card.classList.remove('hovered'));

    if(hovered && nearestDist<180){
      hovered.classList.add('hovered');
      const r=hovered.getBoundingClientRect();
      const cx=r.left+r.width/2;
      const cy=r.top+r.height/2;
      const dx=mouseX-cx, dy=mouseY-cy;
      hovered.style.zIndex=999;
      hovered.style.transform=`translate(-50%, -50%) translate(${dx*0.04}px, ${-18+dy*0.03}px) scale(1.14) rotate(${dx*0.02}deg)`;
      hovered.style.filter='brightness(1.2) saturate(1.1)';
    }

    mainScreen.classList.toggle('hover-dim', selectedCards.length>0);
    requestAnimationFrame(hoverFlow);
  }

  cardRow.addEventListener('click', ()=>{
    if(!arranged && mainScreen.classList.contains('active')) arrangeArc();
  });

  window.addEventListener('mousemove', e=>{
    const dx=e.clientX-mouseX;
    mouseX=e.clientX; mouseY=e.clientY;
    if(arranged && selectedCards.length<3 && !pausedHover && !dragState.active){
      targetDeckOffset -= dx*0.03;
      targetDeckOffset=Math.max(0, Math.min(tarotData.length-1, targetDeckOffset));
    }
  });

  window.addEventListener('wheel', e=>{
    if(!arranged || selectedCards.length>=3 || pausedHover) return;
    targetDeckOffset += e.deltaY*0.012;
    targetDeckOffset=Math.max(0, Math.min(tarotData.length-1, targetDeckOffset));
  }, { passive:true });

  cardRow.addEventListener('pointerdown', e=>{
    if(!arranged || selectedCards.length>=3 || pausedHover) return;
    dragState.active=true;
    dragState.lastX=e.clientX;
    dragState.velocity=0;
  });

  window.addEventListener('pointermove', e=>{
    if(!dragState.active) return;
    const dx=e.clientX-dragState.lastX;
    dragState.lastX=e.clientX;
    dragState.velocity = dragState.velocity * 0.82 + dx * 0.18;
    targetDeckOffset -= dx*0.045;
    targetDeckOffset=Math.max(0, Math.min(tarotData.length-1, targetDeckOffset));
  });

  window.addEventListener('pointerup', ()=>{
    if(!dragState.active) return;
    dragState.active=false;
    targetDeckOffset += -dragState.velocity*0.16;
    targetDeckOffset=Math.max(0, Math.min(tarotData.length-1, targetDeckOffset));
  });

  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') returnToIntro();
  });

  createGalaxy();
  resetAll();
  requestAnimationFrame(hoverFlow);
  requestAnimationFrame(settleInertia);
</script>
</body>
